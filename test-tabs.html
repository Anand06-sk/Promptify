<!doctype html>
<html>
  <head>
    <title>Tab Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }

      .test-container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .test-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddd;
      }

      .test-tab-btn {
        padding: 10px 20px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
      }

      .test-tab-btn.active {
        border-bottom-color: #007bff;
        color: #007bff;
        font-weight: bold;
      }

      .test-form {
        display: none !important;
      }

      .test-form.active {
        display: block !important;
      }

      .test-form h2 {
        margin-top: 0;
      }

      .test-form p {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="test-container">
      <h1>Tab Switching Test</h1>

      <div class="test-tabs">
        <button class="test-tab-btn active" data-tab="login">Login</button>
        <button class="test-tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <form class="test-form active" data-tab="login">
        <h2>Login Form</h2>
        <p>This is the login tab. Click the Sign Up button to switch.</p>
        <input type="text" placeholder="Email" />
        <input type="password" placeholder="Password" />
      </form>

      <form class="test-form" data-tab="signup">
        <h2>Sign Up Form</h2>
        <p>This is the signup tab. Click the Login button to switch back.</p>
        <input type="text" placeholder="Username" />
        <input type="text" placeholder="Email" />
        <input type="password" placeholder="Password" />
      </form>
    </div>

    <script>
      console.log("Tab test page loaded");

      const tabButtons = document.querySelectorAll(".test-tab-btn");
      const forms = document.querySelectorAll(".test-form");

      console.log("Found buttons:", tabButtons.length);
      console.log("Found forms:", forms.length);

      tabButtons.forEach((button) => {
        button.addEventListener("click", (e) => {
          e.preventDefault();

          const tabName = button.getAttribute("data-tab");
          console.log("Clicked tab:", tabName);

          // Remove active from all
          tabButtons.forEach((btn) => btn.classList.remove("active"));
          forms.forEach((form) => form.classList.remove("active"));

          // Add active to current
          button.classList.add("active");
          const targetForm = document.querySelector(
            `.test-form[data-tab="${tabName}"]`,
          );
          if (targetForm) {
            targetForm.classList.add("active");
            console.log("Switched to form:", tabName);
          }
        });
      });
    </script>
  </body>
</html>
