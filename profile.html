<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — PromptVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .profile-wrapper {
        max-width: 1360px;
        margin: 0 auto;
        padding: 40px 32px 60px;
      }

      /* Hero Banner Section */
      .profile-banner-section {
        margin-bottom: 50px;
      }

      .profile-banner {
        position: relative;
        width: 100%;
        height: 280px;
        background-size: cover;
        background-position: center;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(167, 139, 250, 0.15);
      }

      .profile-banner::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 1;
      }

      .profile-banner::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at bottom left,
          rgba(167, 139, 250, 0.1) 0%,
          transparent 70%
        );
        z-index: 2;
      }

      .profile-header-overlay {
        position: absolute;
        bottom: 0;
        left: 32px;
        right: 32px;
        display: flex;
        align-items: flex-end;
        gap: 24px;
        padding-bottom: 24px;
        z-index: 3;
      }

      .profile-avatar {
        width: 130px;
        height: 130px;
        min-width: 130px;
        border-radius: 20px;
        background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 3rem;
        font-weight: 700;
        border: 6px solid var(--surface);
        box-shadow: 0 15px 45px rgba(167, 139, 250, 0.4),
          inset 0 0 30px rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background-size: cover;
        background-position: center;
      }

      .profile-header-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
        color: white;
      }

      .profile-name {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .profile-email {
        color: rgba(255, 255, 255, 0.9);
        font-size: 0.95rem;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }

      .profile-actions-header {
        display: flex;
        gap: 10px;
        margin-left: auto;
      }

      .profile-actions-header .icon-action-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        font-size: 1rem;
      }

      .profile-actions-header .icon-action-btn:hover {
        background: rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-2px);
      }

      /* Stats Section */
      .stats-section {
        margin-bottom: 50px;
      }

      .profile-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
      }

      .stat-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        box-shadow: var(--glass-shadow);
        border-radius: 20px;
        padding: 28px 24px;
        text-align: center;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.1) 0%, transparent 70%);
        pointer-events: none;
      }

      .stat-card:hover {
        border-color: var(--purple);
        background: linear-gradient(
          135deg,
          rgba(167, 139, 250, 0.1) 0%,
          rgba(236, 72, 153, 0.05) 100%
        );
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(167, 139, 250, 0.2),
          var(--glass-shadow);
      }

      .stat-icon {
        font-size: 2.2rem;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: inline-block;
      }

      .stat-number {
        font-size: 2.4rem;
        font-weight: 800;
        background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
        display: block;
      }

      .stat-label {
        font-size: 0.9rem;
        color: var(--text-soft);
        font-weight: 500;
        position: relative;
        z-index: 1;
      }

      /* Bookmarks section */
      .bookmarks-section {
        margin-bottom: 40px;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 1.8rem;
        font-weight: 600;
        color: var(--text);
        margin: 0;
      }

      .section-title i {
        background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .bookmarks-container {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        box-shadow: var(--glass-shadow);
        border-radius: 20px;
        padding: 24px;
      }

      .bookmarks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }

      .bookmark-card {
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition: all var(--transition);
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .bookmark-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 16px 40px rgba(167, 139, 250, 0.2);
        border-color: var(--purple);
      }

      .bookmark-image {
        width: 100%;
        height: 160px;
        background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        overflow: hidden;
      }

      .bookmark-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .bookmark-card:hover .bookmark-image img {
        transform: scale(1.05);
      }

      .bookmark-info {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .bookmark-title {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 8px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .bookmark-category {
        font-size: 0.75rem;
        color: var(--text-soft);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
      }

      .empty-bookmarks {
        text-align: center;
        padding: 60px 40px;
        color: var(--text-soft);
      }

      .empty-bookmarks i {
        font-size: 3rem;
        margin-bottom: 16px;
        background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        display: block;
      }

      .empty-bookmarks p {
        margin: 0 0 20px 0;
        font-size: 1rem;
      }

      .empty-bookmarks a {
        color: var(--purple-deep);
        font-weight: 600;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .empty-bookmarks a:hover {
        color: var(--pink);
      }

      /* Responsive */
      @media (max-width: 900px) {
        .profile-wrapper {
          padding: 30px 20px 40px;
        }

        .profile-banner {
          height: 240px;
        }

        .profile-header-overlay {
          position: relative;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          bottom: auto;
          left: 0;
          right: 0;
          gap: 16px;
          padding: 30px 24px 24px;
        }

        .profile-avatar {
          width: 110px;
          height: 110px;
          min-width: 110px;
          font-size: 2.5rem;
          border-width: 5px;
        }

        .profile-header-info {
          text-align: center;
          gap: 10px;
        }

        .profile-name {
          font-size: 1.6rem;
        }

        .profile-actions-header {
          margin-left: 0;
          width: 100%;
          justify-content: center;
          gap: 12px;
          padding-top: 8px;
        }

        .profile-stats {
          grid-template-columns: repeat(2, 1fr);
        }

        .bookmarks-grid {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        }

        .section-title {
          font-size: 1.5rem;
        }
      }

      @media (max-width: 640px) {
        .profile-wrapper {
          padding: 20px 16px 30px;
        }

        .profile-banner {
          height: 200px;
          border-radius: 16px;
        }

        .profile-header-overlay {
          position: relative;
          left: 0;
          right: 0;
          bottom: auto;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          gap: 14px;
          padding: 28px 16px 16px;
        }

        .profile-avatar {
          width: 100px;
          height: 100px;
          min-width: 100px;
          font-size: 2.2rem;
          border-width: 4px;
        }

        .profile-header-info {
          text-align: center;
          gap: 8px;
        }

        .profile-name {
          font-size: 1.4rem;
        }

        .profile-email {
          font-size: 0.85rem;
        }

        .profile-actions-header {
          justify-content: center;
          gap: 12px;
          width: 100%;
          margin-left: 0;
          padding-top: 6px;
        }

        .profile-stats {
          grid-template-columns: 1fr;
          gap: 16px;
        }

        .stat-card {
          padding: 20px 16px;
        }

        .stat-number {
          font-size: 2rem;
        }

        .bookmarks-grid {
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 12px;
        }

        .bookmarks-container {
          padding: 16px;
        }

        .section-title {
          font-size: 1.3rem;
        }

        .bookmark-image {
          height: 130px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background mesh -->
    <div class="bg-mesh" aria-hidden="true">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="blob blob-3"></span>
    </div>

    <!-- Navbar -->
    <header class="navbar" id="navbar">
      <div class="navbar-inner">
        <a href="index.html" class="logo">
          <span class="logo-mark">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
          </span>
          <span class="logo-text">Prompt<em>Verse</em></span>
        </a>
        <div style="flex: 1"></div>
        <div class="nav-actions">
          <button
            class="icon-btn"
            id="darkModeToggle"
            aria-label="Toggle dark mode"
          >
            <i class="fa-solid fa-moon"></i>
          </button>
          <button class="btn btn-outline" id="logoutBtn">
            <i class="fa-solid fa-sign-out-alt"></i> Logout
          </button>
          <a href="index.html" class="btn btn-primary">
            <i class="fa-solid fa-arrow-left"></i> Back
          </a>
        </div>
      </div>
    </header>

    <main>
      <div class="profile-wrapper">
        <!-- Email Verification Status -->
        <div id="verificationStatusContainer" style="margin-bottom: 20px"></div>

        <!-- Hero Banner Section -->
        <div class="profile-banner-section">
          <div class="profile-banner" id="profileBanner">
            <div class="profile-header-overlay">
              <div class="profile-avatar" id="profileAvatar">U</div>
              <div class="profile-header-info">
                <div class="profile-name" id="profileName">User</div>
                <div class="profile-email" id="profileEmail">user@example.com</div>
              </div>
              <div class="profile-actions-header">
                <button class="icon-action-btn" id="settingsBtn" title="Settings">
                  <i class="fa-solid fa-gear"></i>
                </button>
                <button class="icon-action-btn" id="logoutBtnAction" title="Logout">
                  <i class="fa-solid fa-sign-out-alt"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
          <div class="profile-stats">
            <div class="stat-card">
              <i class="stat-icon fa-solid fa-bookmark"></i>
              <div class="stat-number" id="totalBookmarks">0</div>
              <div class="stat-label">Saved Prompts</div>
            </div>
            <div class="stat-card">
              <i class="stat-icon fa-solid fa-calendar-days"></i>
              <div class="stat-number" id="joinDate">—</div>
              <div class="stat-label">Member Since</div>
            </div>
          </div>
        </div>

        <!-- Bookmarks Section -->
        <section class="bookmarks-section">
          <div class="section-header">
            <h2 class="section-title">
              <i class="fa-solid fa-bookmark"></i> My Bookmarks
            </h2>
          </div>
          <div class="bookmarks-container">
            <div id="bookmarksContainer" class="bookmarks-grid"></div>
            <div id="emptyBookmarks" class="empty-bookmarks" hidden>
              <i class="fa-solid fa-bookmark"></i>
              <p>You haven't saved any prompts yet</p>
              <a href="index.html">Start exploring →</a>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import { logoutUser, resendVerificationEmail } from "./auth.js";
      import { getUserBookmarks, getBookmarkCount } from "./user-service.js";
      import { auth } from "./firebase-config.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

      // Auth check and load
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          // User not logged in - redirect to auth page
          window.location.href = "auth.html?next=profile.html";
          return;
        }

        // Update profile info with Firebase user data
        const displayName =
          user.displayName || user.email.split("@")[0] || "User";
        const firstLetter = displayName.charAt(0).toUpperCase();

        document.getElementById("profileAvatar").textContent = firstLetter;
        document.getElementById("profileName").textContent = displayName;
        document.getElementById("profileEmail").textContent = user.email || "";

        // Set banner background image
        const banner = document.getElementById("profileBanner");
        banner.style.backgroundImage = "url('./profile.jpeg')";

        // Set avatar from photoURL if available, otherwise show initials
        if (user.photoURL) {
          const avatar = document.getElementById("profileAvatar");
          avatar.style.backgroundImage = `url(${user.photoURL})`;
          avatar.style.backgroundSize = "cover";
          avatar.textContent = "";
        }

        // Format join date - use user's creation time if available
        const joinDate = user.metadata?.creationTime
          ? new Date(user.metadata.creationTime)
          : new Date();
        const formattedDate = joinDate.toLocaleDateString("en-US", {
          month: "short",
          year: "numeric",
        });
        document.getElementById("joinDate").textContent = formattedDate;

        // Show verification status
        showVerificationStatus(user);

        // Load bookmarks from Firebase
        try {
          const userBookmarks = await getUserBookmarks();
          const bookmarkCount = userBookmarks.length;

          document.getElementById("totalBookmarks").textContent = bookmarkCount;

          if (bookmarkCount === 0) {
            document.getElementById("emptyBookmarks").hidden = false;
            document.getElementById("bookmarksContainer").hidden = true;
          } else {
            document.getElementById("emptyBookmarks").hidden = true;
            // Display user's bookmarks
            displayUserBookmarks(userBookmarks);
          }
        } catch (error) {
          console.error("Error loading bookmarks:", error);
          document.getElementById("emptyBookmarks").hidden = false;
        }
      });

      // Display user's bookmarks in the grid
      function displayUserBookmarks(bookmarks) {
        const container = document.getElementById("bookmarksContainer");
        container.innerHTML = "";

        bookmarks.forEach((bookmark) => {
          const card = document.createElement("div");
          card.className = "bookmark-card";
          card.innerHTML = `
            <div class="bookmark-image">
              <img src="${bookmark.image || "https://via.placeholder.com/200x160"}" alt="${bookmark.title || "Prompt"}" />
            </div>
            <div class="bookmark-info">
              <div class="bookmark-title">${bookmark.title || "Untitled Prompt"}</div>
              <div class="bookmark-category">${bookmark.category || "General"}</div>
            </div>
          `;
          container.appendChild(card);
        });

        container.hidden = false;
      }

      // Email verification status
      function showVerificationStatus(user) {
        const statusContainer = document.getElementById(
          "verificationStatusContainer",
        );
        if (!statusContainer) return;

        if (!user.emailVerified) {
          statusContainer.innerHTML = `
          <div style="
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border: 1px solid #fcd34d;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #78350f;
          ">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 1.2rem; flex-shrink: 0;"></i>
            <div style="flex: 1;">
              <p style="font-weight: 600; margin: 0 0 4px 0;">Email Not Verified</p>
              <p style="font-size: 0.9rem; margin: 0;">Verification link sent to <strong>${user.email}</strong>. Check your spam folder if you don't see it.</p>
            </div>
            <button
              id="profileResendVerificationBtn"
              style="
                background: #ea580c;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
                font-size: 0.85rem;
                white-space: nowrap;
                transition: background 0.3s ease;
              "
              onmouseover="this.style.background = '#d97706'"
              onmouseout="this.style.background = '#ea580c'"
            >
              Resend Email
            </button>
          </div>
        `;

          const resendBtn = document.getElementById(
            "profileResendVerificationBtn",
          );
          if (resendBtn) {
            resendBtn.addEventListener("click", async () => {
              try {
                resendBtn.disabled = true;
                resendBtn.textContent = "Sending...";
                await resendVerificationEmail();
                resendBtn.textContent = "Email sent! Check your inbox";
                setTimeout(() => {
                  resendBtn.disabled = false;
                  resendBtn.textContent = "Resend Email";
                }, 3000);
              } catch (error) {
                console.error("Error resending verification:", error);
                alert("Error: " + error.message);
                resendBtn.disabled = false;
                resendBtn.textContent = "Resend Email";
              }
            });
          }
        } else {
          // If verified, hide the verification status container
          statusContainer.hidden = true;
        }
      }

      // Dark mode toggle
      const darkModeToggle = document.getElementById("darkModeToggle");
      const darkToggleIcon = darkModeToggle.querySelector("i");

      function applyDarkMode(isDark) {
        document.body.classList.toggle("dark", isDark);
        localStorage.setItem("pv_dark", isDark ? "1" : "0");
        darkToggleIcon.className = isDark
          ? "fa-solid fa-sun"
          : "fa-solid fa-moon";
      }

      const savedDark = localStorage.getItem("pv_dark") === "1";
      applyDarkMode(savedDark);

      darkModeToggle.addEventListener("click", () => {
        applyDarkMode(!document.body.classList.contains("dark"));
      });

      // Logout handlers
      const handleLogout = async () => {
        try {
          await logoutUser();
          // logoutUser already handles the redirect via onAuthStateChanged listener
          // But we'll add explicit redirect as fallback
          setTimeout(() => {
            window.location.href = "index.html";
          }, 500);
        } catch (error) {
          console.error("Logout failed:", error);
          window.location.href = "index.html";
        }
      };

      document
        .getElementById("logoutBtn")
        ?.addEventListener("click", handleLogout);
      document
        .getElementById("logoutBtnAction")
        ?.addEventListener("click", handleLogout);

      // Settings button (placeholder)
      document.getElementById("settingsBtn")?.addEventListener("click", () => {
        alert("Settings coming soon!");
      });

      // Navbar scroll shadow
      const navbar = document.getElementById("navbar");
      window.addEventListener("scroll", () => {
        navbar.style.boxShadow =
          window.scrollY > 10 ? "0 8px 24px rgba(139,92,246,0.10)" : "none";
      });
    </script>
  </body>
</html>
